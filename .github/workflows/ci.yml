name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Build + test (host x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install 32-bit toolchain (for the i386 x87 run-correctness section)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib libc6-dev-i386
      - name: Build stage-0 tools (transpile UPLNC -> C, build lpp1 + langc)
        run: ./build.sh
        working-directory: transpiler
      - name: Run test suite (x86_64 + i386 run-correctness)
        run: bash tests/run_tests.sh
        working-directory: transpiler

  test-arm64:
    name: Build + test (host arm64)
    # Confirms host-portability: the transpiled compiler builds and runs (and
    # self-compiles to .s) on a non-x86 host. Output is still i386 asm, which is
    # not assembled here -- run_tests.sh links nothing target-specific. The build
    # uses -fsigned-char so ARM's unsigned-char default matches i386 semantics.
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build stage-0 tools on arm64
        run: ./build.sh
        working-directory: transpiler
      - name: Run test suite (19 checks) on arm64
        run: bash tests/run_tests.sh
        working-directory: transpiler

  fixpoint:
    name: Self-host fixpoint (i386, -m32)
    runs-on: ubuntu-latest
    # The fixpoint is verified in CI (stage-2 == stage-3 assembly), so this is a
    # gate: if a change breaks self-hosting, fixpoint.sh exits non-zero and fails.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install 32-bit toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib libc6-dev-i386
      - name: Build with -m32 and run the fixpoint check
        run: |
          ./build.sh
          ./fixpoint.sh i386
        working-directory: transpiler

  fixpoint-x86_64:
    name: Self-host fixpoint (x86_64, native)
    runs-on: ubuntu-latest
    # The x86_64 backend self-hosts natively -- no 32-bit toolchain. langc emits
    # System V x86_64, links with gcc -no-pie, and stage-2 == stage-3. A gate.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build and run the x86_64 fixpoint check
        run: |
          ./build.sh
          ./fixpoint.sh x86_64
        working-directory: transpiler

  cross-compile:
    name: Cross-compile self-host (x86_64 host -> i386)
    runs-on: ubuntu-latest
    # Proves the HOST/TARGET word-size split: a NATIVE x86_64 langc (8-byte host
    # word) cross-emits i386 (4-byte target word), which is linked with -m32 and
    # self-hosts. fixpoint.sh's "stage-1 == stage-2" line is the proof -- stage-1
    # is the x86_64-host compiler's i386 output, stage-2 the i386-host compiler's;
    # identical => the emitted i386 does not depend on the host word size.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install 32-bit toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib libc6-dev-i386
      - name: Native-host stage-0, cross-emit i386, self-host
        run: |
          UPLNC_NATIVE=1 ./build.sh
          file build/langc | grep -q 'ELF 64-bit' || { echo "stage-0 is not native 64-bit"; exit 1; }
          ./fixpoint.sh i386
          # Host-independence GATE: stage-1 (i386 emitted by the x86_64-host
          # compiler) must be byte-identical to stage-2 (i386 emitted by the
          # i386-host compiler). If they differ, the i386 output depends on the
          # host word size -- the WORDSIZE split would be incomplete. cmp fails
          # the job on any difference.
          echo "Proving host-independence: stage-1 (x86_64 host) vs stage-2 (i386 host)"
          for u in langc codegen autodyn grph lpp1; do
            cmp "build/i386/s1/$u.s" "build/i386/s2/$u.s"
          done
          echo "PROVEN: emitted i386 is identical regardless of host word size."
        working-directory: transpiler
