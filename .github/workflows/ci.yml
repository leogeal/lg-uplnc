name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Build + test (host x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build stage-0 tools (transpile UPLNC -> C, build lpp1 + langc)
        run: ./build.sh
        working-directory: transpiler
      - name: Run test suite (19 checks)
        run: bash tests/run_tests.sh
        working-directory: transpiler

  test-arm64:
    name: Build + test (host arm64)
    # Confirms host-portability: the transpiled compiler builds and runs (and
    # self-compiles to .s) on a non-x86 host. Output is still i386 asm, which is
    # not assembled here -- run_tests.sh links nothing target-specific. The build
    # uses -fsigned-char so ARM's unsigned-char default matches i386 semantics.
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build stage-0 tools on arm64
        run: ./build.sh
        working-directory: transpiler
      - name: Run test suite (19 checks) on arm64
        run: bash tests/run_tests.sh
        working-directory: transpiler

  fixpoint:
    name: Self-host fixpoint (i386, -m32)
    runs-on: ubuntu-latest
    # The fixpoint is verified in CI (stage-2 == stage-3 assembly), so this is a
    # gate: if a change breaks self-hosting, fixpoint.sh exits non-zero and fails.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install 32-bit toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib libc6-dev-i386
      - name: Build with -m32 and run the fixpoint check
        run: |
          ./build.sh
          ./fixpoint.sh i386
        working-directory: transpiler

  fixpoint-x86_64:
    name: Self-host fixpoint (x86_64, native)
    runs-on: ubuntu-latest
    # The x86_64 backend self-hosts natively -- no 32-bit toolchain. langc emits
    # System V x86_64, links with gcc -no-pie, and stage-2 == stage-3. A gate.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build and run the x86_64 fixpoint check
        run: |
          ./build.sh
          ./fixpoint.sh x86_64
        working-directory: transpiler
